<html>
  <head>
    <title>Recaman</title>
    <link href="../css/reset.css" rel="stylesheet" />
    <link href="../css/layout.css" rel="stylesheet" />
    <script type="application/javascript" src="../dist/main.js"></script>
  </head>

  <body>
    <div style="display: flex; flex-direction: row">
      <div class="header_container" style="width: 300px">
        <header>Recaman</header>
      </div>

      <div id="inputs">
        <input
          id="root-input"
          type="range"
          value="0"
          min="0"
          max="100"
          step="1"
        />
        <input
          id="count-input"
          type="range"
          value="40"
          min="1"
          max="500"
          step="1"
        />
        <input
          id="number-space-input"
          type="range"
          value="3"
          min="1"
          max="20"
          step="1"
        />
      </div>
    </div>

    <section id="canvas-div" class="canvas-container">
      <canvas id="canvas" class="canvas"></canvas>
    </section>
  </body>
</html>
